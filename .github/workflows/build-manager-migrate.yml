# Bouwt + pusht de manager-migrate-wrapper-image naar ghcr.
# ZAD pullt images uit een registry; de wrapper (deploy/zad/manager-migrate, migrate->serve)
# bestond tot nu toe alleen lokaal (docker compose build). Deze reusable workflow publiceert 'm
# zodat deploy.yml de directory-manager op ZAD kan draaien — én previews een eigen image hebben.
#
# Alleen workflow_dispatch/workflow_call, geen push-trigger: aanroepers geven de tag expliciet
# mee via image_suffix (main -> canoniek, PR -> pr-<n>). Geen marketplace docker-actions: docker
# + buildx op de runner in run-steps, zodat er geen extra action-SHA te pinnen is (alleen
# checkout) en Scorecard Pinned-Dependencies groen blijft.
name: build-manager-migrate

on:
  # Aangeroepen door zad-deploy-directory (build-job) vóór een deploy: main -> canonieke tag,
  # PR -> pr-<n>-suffix. De losse branch-push-build is vervallen: previews bouwen nu via deze
  # workflow_call (ordering-veilig in één run), dus een aparte push-build zou dubbel bouwen.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "OpenFSC manager-basisversie (build-arg IMAGE_TAG + image-tag)"
        required: false
        default: "v1.43.7"
      image_suffix:
        description: "optioneel: tag-suffix (bv. pr-42); leeg = canonieke tag"
        required: false
        default: ""
  workflow_call:
    inputs:
      image_tag:
        description: "OpenFSC manager-basisversie (build-arg IMAGE_TAG + image-tag)"
        required: false
        type: string
        default: "v1.43.7"
      image_suffix:
        description: "optioneel: tag-suffix (bv. pr-42); leeg = canonieke tag"
        required: false
        type: string
        default: ""

# Top-level read-only; write-scope alleen op de job die pusht (Scorecard Token-Permissions).
permissions:
  contents: read

concurrency:
  group: build-manager-migrate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build en push manager-migrate naar ghcr
        env:
          # Lowercase image-pad, exact zoals deploy.yml de canonieke tag consumeert.
          IMAGE: ghcr.io/minbzk/moza-fsc-testnet/manager-migrate
          IMAGE_TAG: ${{ inputs.image_tag || 'v1.43.7' }}
          IMAGE_SUFFIX: ${{ inputs.image_suffix }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [ -n "$IMAGE_SUFFIX" ]; then
            tag="${IMAGE_TAG}-${IMAGE_SUFFIX}"
          else
            tag="${IMAGE_TAG}"
          fi
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
          docker buildx build \
            --build-arg "IMAGE_TAG=${IMAGE_TAG}" \
            --tag "${IMAGE}:${tag}" \
            --label "org.opencontainers.image.source=https://github.com/${REPO}" \
            --push \
            deploy/zad/manager-migrate
          echo "Gepusht: ${IMAGE}:${tag}"
