# Bouwt + pusht de manager-migrate-wrapper-image naar ghcr (#729).
# ZAD pullt images uit een registry; de wrapper (deploy/zad/manager-migrate, migrate->serve)
# bestond tot nu toe alleen lokaal (docker compose build). Deze job publiceert 'm zodat
# deploy.yml de directory-manager op ZAD kan draaien — én previews een branch-image hebben.
#
# Triggert op push naar ELKE branch (path-gefilterd op de wrapper), zodat een PR-preview een
# eigen branch-getagde image krijgt en de image niet pas vanaf main bestaat. Geen marketplace
# docker-actions: docker + buildx op de runner in run-steps, zodat er geen extra action-SHA te
# pinnen is (alleen checkout) en Scorecard Pinned-Dependencies groen blijft.
name: build-manager-migrate

on:
  # `main` bouwt via de reusable-call in zad-deploy-directory (build->deploy in één run,
  # geen dubbele build + geen concurrency-clash). Hier alleen branch-previews.
  push:
    branches-ignore: [main]
    paths:
      - "deploy/zad/manager-migrate/**"
      - ".github/workflows/build-manager-migrate.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "OpenFSC manager-basisversie (build-arg IMAGE_TAG + image-tag)"
        required: false
        default: "v1.43.7"
  # Aangeroepen door zad-deploy-directory (build-job) vóór de deploy naar test.
  workflow_call:
    inputs:
      image_tag:
        description: "OpenFSC manager-basisversie (build-arg IMAGE_TAG + image-tag)"
        required: false
        type: string
        default: "v1.43.7"

# Top-level read-only; write-scope alleen op de job die pusht (Scorecard Token-Permissions).
permissions:
  contents: read

concurrency:
  group: build-manager-migrate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build en push manager-migrate naar ghcr
        env:
          # Lowercase image-pad, exact zoals deploy.yml de canonieke tag consumeert.
          IMAGE: ghcr.io/minbzk/moza-fsc-testnet/manager-migrate
          IMAGE_TAG: ${{ inputs.image_tag || 'v1.43.7' }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          # Branch-slug voor een preview-tag; main krijgt daarnaast de canonieke tag.
          slug="$(printf '%s' "$REF_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_.-' '-')"
          tags="--tag ${IMAGE}:${IMAGE_TAG}-${slug}"
          main_extra=""
          if [ "$REF_NAME" = "main" ]; then
            tags="$tags --tag ${IMAGE}:${IMAGE_TAG}"
            main_extra=" + ${IMAGE}:${IMAGE_TAG}"
          fi
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
          # shellcheck disable=SC2086
          docker buildx build \
            --build-arg "IMAGE_TAG=${IMAGE_TAG}" \
            $tags \
            --label "org.opencontainers.image.source=https://github.com/${REPO}" \
            --push \
            deploy/zad/manager-migrate
          echo "Gepusht: ${IMAGE}:${IMAGE_TAG}-${slug}${main_extra}"
