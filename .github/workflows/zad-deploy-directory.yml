# Directe ZAD-API-deploy van de directory (#723) via de v2 Operations Manager API.
# Roept deploy/zad/upsert-directory.sh aan (zelfde bron als de CLI). `validate` is read-only;
# `apply` upsert het deployment. Model: push main -> `test`; PR -> preview `pr-<PR-nummer>`
# (open/sync = deploy, close = cleanup); workflow_dispatch = handmatige override.
#
# Dekt alleen de deploy-API (deployment + componenten + images + domain_format). NIET via de API
# (UI-only): bijlagen (cert-mount), env-vars, "Publicatie op het web" (passthrough-TLS).
name: zad-deploy-directory

on:
  # Auto-deploy naar `test`: een merge naar main (CI groen) rolt de centrale directory uit.
  # Path-filter = wat de directory-deploy raakt; docs/peers-merges blijven stil. Ordering
  # (build -> deploy, geen race) via de changes/build/deploy-jobs. Zie docs/zad-directory-deploy.md.
  push:
    branches: [main]
    paths:
      - "deploy/zad/upsert-directory.sh"
      - "deploy/zad/manager-migrate/**"
      - "group/**"
      - ".github/workflows/zad-deploy-directory.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      mode:
        description: "validate=auth-check; plan=toon bodies; apply=muteren + pollen"
        type: choice
        options: [validate, plan, apply]
        default: validate
      deployment:
        description: "deployment-naam (main -> test; PR -> pr-<PR-nummer>)"
        required: false
        default: "test"
      image_tag:
        description: "OpenFSC stock-tag (directory-ui; default voor de manager)"
        required: false
        default: "v1.43.7"
      manager_tag:
        description: "ghcr manager-migrate-tag (bv. branch-tag); leeg = image_tag"
        required: false
        default: ""
      clone_from:
        description: "optioneel: erf componenten van deze deployment (bv. test)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  # Eén run per deployment tegelijk: PR -> pr-<n>, push/dispatch -> test/input. Deploys niet
  # halverwege killen (een halve ZAD-deploy laat een inconsistente staat achter).
  group: zad-deploy-directory-${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || inputs.deployment || 'test' }}
  cancel-in-progress: false

jobs:
  # Afgeleide waarden op één plek: deployment-naam, OpenFSC-basistag, manager-image-suffix.
  meta:
    runs-on: ubuntu-latest
    outputs:
      deployment: ${{ steps.m.outputs.deployment }}
      image_base: ${{ steps.m.outputs.image_base }}
      manager_suffix: ${{ steps.m.outputs.manager_suffix }}
    steps:
      - id: m
        env:
          EVENT: ${{ github.event_name }}
          PR: ${{ github.event.pull_request.number }}
          INPUT_DEPLOYMENT: ${{ inputs.deployment }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          image_base="${INPUT_IMAGE_TAG:-v1.43.7}"
          if [ "$EVENT" = "pull_request" ]; then
            deployment="pr-${PR}"
            manager_suffix="pr-${PR}"
          else
            deployment="${INPUT_DEPLOYMENT:-test}"
            manager_suffix=""
          fi
          {
            echo "deployment=${deployment}"
            echo "image_base=${image_base}"
            echo "manager_suffix=${manager_suffix}"
          } >> "$GITHUB_OUTPUT"

  # Detecteert of de manager-migrate-wrapper (image) wijzigde, zodat de build alleen dan draait.
  # git diff in een run-step (geen marketplace-action) -> OpenSSF Scorecard blijft groen.
  changes:
    runs-on: ubuntu-latest
    outputs:
      manager_migrate_changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detecteer manager-migrate-wijziging
        id: diff
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Alleen push (main) bouwt automatisch; dispatch bouwt niet (geef anders manager_tag mee).
          if [ "${EVENT}" != "push" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # Eerste push / onbekende basis (all-zero SHA) -> veilig bouwen.
          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if git diff --name-only "${BEFORE}" "${SHA}" | grep -q '^deploy/zad/manager-migrate/'; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

  # Bouwt + pusht de manager-migrate-image (canonieke v1.43.7) vóór de deploy. Alleen bij een
  # image-wijziging; anders geskipt en herbruikt deploy de bestaande tag. Reusable workflow =
  # één bron voor de build-logica.
  build:
    needs: changes
    if: ${{ needs.changes.outputs.manager_migrate_changed == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-manager-migrate.yml
    with:
      image_tag: ${{ inputs.image_tag || 'v1.43.7' }}

  # Rolt de directory uit. Draait ná build-succes, of meteen als de build geskipt is
  # (config/group-only) -> de image bestaat gegarandeerd vóór apply.
  deploy:
    needs: [changes, build]
    if: >-
      ${{ always() && needs.changes.result == 'success'
          && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Upsert directory via ZAD v2-API
        env:
          ZAD_API_KEY: ${{ secrets.ZAD_API_KEY_DIRECTORY }}
          ZAD_PROJECT: ${{ vars.ZAD_PROJECT_ID_DIRECTORY }}
          # Push naar main = altijd apply/test; dispatch gebruikt zijn inputs.
          MODE: ${{ github.event_name == 'push' && 'apply' || inputs.mode }}
          DEPLOYMENT: ${{ inputs.deployment || 'test' }}
          IMAGE_TAG: ${{ inputs.image_tag || 'v1.43.7' }}
          ZAD_MANAGER_TAG: ${{ inputs.manager_tag }}
          CLONE_FROM: ${{ inputs.clone_from }}
        run: ./deploy/zad/upsert-directory.sh "${MODE}" "${DEPLOYMENT}" "${IMAGE_TAG}" "${CLONE_FROM}"
