# ZAD deploy (#723/#729). workflow_dispatch zodat het niet auto-draait.
name: deploy-fsc-testnet
on:
  workflow_dispatch:

permissions: {}

jobs:
  directory:
    runs-on: ubuntu-latest
    # NB: ZAD `attachments` (cert-mount) is sinds 2026-06-29 beschikbaar — mount de certs
    # als attachments (paden: zie peers/directory/manager.env.example) om groen te draaien (#723).
    # TODO(#729): bouw + push de wrapper-image (deploy/zad/manager-migrate) naar
    #   ghcr.io/minbzk/moza-fsc-testnet/manager-migrate in een eigen CI-job; nu
    #   bestaat 'm alleen lokaal (docker compose build).
    # TODO(#729): bootstrap de `fsc_directory`-database op directory-postgres. De
    #   wrapper draait alleen `migrate up` (geen CREATE DATABASE); lokaal doet
    #   postgres-init.sql dat. Zet op ZAD POSTGRES_DB=fsc_directory of een init-stap.
    steps:
      - name: Deploy directory (group-anker) naar ZAD
        # Versie-gepind (toegestaan); TODO(#729): naar SHA-pin voor Scorecard
        # Pinned-Dependencies zodra zad-actions een release-SHA publiceert.
        uses: RijksICTGilde/zad-actions/deploy@v1
        with:
          api-key: ${{ secrets.ZAD_API_KEY_DIRECTORY }}
          project-id: ${{ vars.ZAD_PROJECT_ID_DIRECTORY }}
          deployment-name: directory
          components: >-
            [
              {"name":"directory-postgres","image":"postgres:17"},
              {"name":"directory-manager","image":"ghcr.io/minbzk/moza-fsc-testnet/manager-migrate:v1.43.7"},
              {"name":"directory-ui","image":"docker.io/federatedserviceconnectivity/directory-ui:v1.43.7"}
            ]
