# ZAD deploy (#723/#729). workflow_dispatch zodat het niet auto-draait.
name: deploy-fsc-testnet
on:
  workflow_dispatch:

permissions: {}

jobs:
  directory:
    runs-on: ubuntu-latest
    # NB: ZAD `attachments` (cert-mount) is sinds 2026-06-29 beschikbaar — mount de certs
    # als attachments (paden: zie peers/directory/manager.env.example) om groen te draaien (#723).
    # De wrapper-image wordt gebouwd + gepusht door build-manager-migrate.yml (#729)
    #   naar ghcr.io/minbzk/moza-fsc-testnet/manager-migrate. Draai die workflow eerst.
    # DB-bootstrap: zet POSTGRES_DB=fsc_directory op de directory-postgres-component
    #   (env-template peers/directory/postgres.env.example) — postgres:17 maakt de DB aan;
    #   de wrapper draait alleen `migrate up` (geen CREATE DATABASE).
    steps:
      - name: Deploy directory (group-anker) naar ZAD
        # SHA-gepind (#729) voor Scorecard Pinned-Dependencies; comment = de tag-ref.
        # NB: dit is de legacy zad-actions-deploy; de actieve deploy loopt via de v2-API
        # (zad-deploy-directory.yml + deploy/zad/upsert-directory.sh), cleanup via zad-cleanup.yml.
        uses: RijksICTGilde/zad-actions/deploy@56ae5cc772e7fa6663b2dee45d24c881bb675a3e # v1
        with:
          api-key: ${{ secrets.ZAD_API_KEY_DIRECTORY }}
          project-id: ${{ vars.ZAD_PROJECT_ID_DIRECTORY }}
          deployment-name: directory
          components: >-
            [
              {"name":"directory-postgres","image":"postgres:17"},
              {"name":"directory-manager","image":"ghcr.io/minbzk/moza-fsc-testnet/manager-migrate:v1.43.7"},
              {"name":"directory-ui","image":"docker.io/federatedserviceconnectivity/directory-ui:v1.43.7"}
            ]
