# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Deze repo bevat geen applicatie-dependencies (config-only). We houden alleen de
# GitHub Actions up-to-date. Voeg hier later docker/helm toe zodra OpenFSC-images
# of charts in deze repo gepind worden.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
