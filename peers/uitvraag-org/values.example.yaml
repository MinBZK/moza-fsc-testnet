# Helm-values voor peer 'uitvraag-org' (template — #723/#724/#725).
# Consumeert de OpenFSC Helm-charts (https://gitlab.com/rinis-oss/fsc/open-fsc, helm/charts).
peer:
  oin: "00000000000000000020"        # synthetische test-OIN (uitvraag heeft geen org-OIN in FBS)
  name: "uitvraag-org"                          # -> subject.organization in het cert
manager:
  managementAddress: "uitvraag-org-manager:8443"
  postgresDsn: "postgres://fsc:fsc@uitvraag-org-postgres:5432/fsc?sslmode=disable"
outway:
  # berichtenuitvraag routeert magazijn-calls hierheen i.p.v. direct (#726)
  listenAddress: "outway:8080"                  # interne HTTP-proxy-poort (intra-project)
  directoryRegistrationAddress: "directory-manager:8443"

# TODO(#723): dit skelet toont alleen de hoofd-adressen. Een werkende OpenFSC-deploy
# vereist daarnaast (zie open-fsc helm/charts):
#   - certificaten: certificates.group.* (group-CA) + certificates.internal.* +
#     certificates.internalUnauthenticated.* (inter-component mTLS, manager<->outway);
#   - interne manager-poorten 9443 (authenticated) en 9444 (unauthenticated);
#   - transaction-log: txlog-api-adres voor manager én outway (verplichte logging-extensie).
# De outway luistert intern (alleen binnen het project bereikbaar), niet op 443/SNI.
# Echte secrets/certs worden via ZAD `attachments` gemount, nooit hier ingevuld.
