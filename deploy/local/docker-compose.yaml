# Lokale harness (#723). Zie deploy/local/README.md voor het cert-contract (#722).
x-manager-image: &manager-image docker.io/federatedserviceconnectivity/manager:${IMAGE_TAG:-v1.43.7}
x-manager-common-env: &manager-common-env
  LOG_TYPE: local
  LOG_LEVEL: debug
  GROUP_ID: moza-fbs-test
  DIRECTORY_PEER_ID: "00000000000000000010"
  DIRECTORY_MANAGER_ADDRESS: https://directory.fsc-test.local:443
  AUDITLOG_TYPE: stdout
  DISABLE_CRL_CHECKS: "true"            # lokaal geen CRL-distributiepunt (zie README)
  TLS_GROUP_ROOT_CERT: /pki/ca/root.pem

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 20s     # faal-checks tellen niet mee tijdens boot
      interval: 10s         # steady-state niet eeuwig op 3s pollen
      timeout: 3s
      retries: 5

  router:
    image: haproxy:2.9
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      default:
        aliases:
          - directory.fsc-test.local
          - example-provider.fsc-test.local
          - example-consumer.fsc-test.local
    depends_on:
      manager-directory:
        condition: service_started

  manager-directory:
    # ZAD-artefact: wrapper-image (migrate->serve in de entrypoint), zoals deploy.yml.
    # Compose bouwt 'm lokaal uit deploy/zad/manager-migrate -> migrate-directory
    # is daarmee overbodig (de wrapper migreert fsc_directory bij start).
    build:
      context: ../../deploy/zad/manager-migrate
      args:
        IMAGE_TAG: ${IMAGE_TAG:-v1.43.7}
    image: manager-migrate:${IMAGE_TAG:-v1.43.7}
    restart: on-failure   # migreert bij boot; herstart bij transiënte DB-race (parity met siblings)
    # Draai als de host-UID/GID zodat de pod de 0600-privékeys leest (matching owner)
    # i.p.v. ze open te zetten. HOST_UID/HOST_GID uit .env (zie README, stap 3).
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      <<: *manager-common-env
      SELF_ADDRESS: https://directory.fsc-test.local:443
      TX_LOG_API_ADDRESS: ""                 # directory-mode: geen txlog
      AUTO_SIGN_GRANTS: servicePublication,delegatedServicePublication
      LISTEN_ADDRESS_EXTERNAL: 0.0.0.0:8443
      LISTEN_ADDRESS_INTERNAL: 0.0.0.0:9443
      LISTEN_ADDRESS_INTERNAL_UNAUTHENTICATED: 0.0.0.0:9444
      MONITORING_ADDRESS: 0.0.0.0:8080
      STORAGE_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/fsc_directory?sslmode=disable
      TLS_GROUP_CERT: &dir-grp /pki/out/directory/directory/cert.pem
      TLS_GROUP_KEY: &dir-grp-key /pki/out/directory/directory/key.pem
      TLS_GROUP_TOKEN_CERT: *dir-grp
      TLS_GROUP_TOKEN_KEY: *dir-grp-key
      TLS_GROUP_CONTRACT_CERT: *dir-grp
      TLS_GROUP_CONTRACT_KEY: *dir-grp-key
      TLS_ROOT_CERT: &dir-introot /pki/internal/directory/ca/root.pem
      TLS_CERT: &dir-int /pki/internal/directory/directory/cert.pem
      TLS_KEY: &dir-int-key /pki/internal/directory/directory/key.pem
      TLS_INTERNAL_UNAUTHENTICATED_ROOT_CERT: *dir-introot
      TLS_INTERNAL_UNAUTHENTICATED_CERT: *dir-int
      TLS_INTERNAL_UNAUTHENTICATED_KEY: *dir-int-key
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    depends_on:
      postgres:
        condition: service_healthy

  migrate-example-provider:
    image: *manager-image
    command:
      - /usr/local/bin/manager
      - migrate
      - up
      - --postgres-dsn
      - postgres://postgres:postgres@postgres:5432/fsc_example_provider?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  manager-example-provider:
    image: *manager-image
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"   # host-UID -> leest 0600-keys (zie manager-directory)
    command:
      - /usr/local/bin/manager
      - serve
    environment:
      <<: *manager-common-env
      SELF_ADDRESS: https://example-provider.fsc-test.local:443
      # presence-check (serve.go); niet gedialed bij announce
      TX_LOG_API_ADDRESS: https://txlog.placeholder.invalid:7611
      LISTEN_ADDRESS_EXTERNAL: 0.0.0.0:8443
      LISTEN_ADDRESS_INTERNAL: 0.0.0.0:9443
      LISTEN_ADDRESS_INTERNAL_UNAUTHENTICATED: 0.0.0.0:9444
      MONITORING_ADDRESS: 0.0.0.0:8080
      STORAGE_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/fsc_example_provider?sslmode=disable
      TLS_GROUP_CERT: &ep-grp /pki/out/example-provider/manager/cert.pem
      TLS_GROUP_KEY: &ep-grp-key /pki/out/example-provider/manager/key.pem
      TLS_GROUP_TOKEN_CERT: *ep-grp
      TLS_GROUP_TOKEN_KEY: *ep-grp-key
      TLS_GROUP_CONTRACT_CERT: *ep-grp
      TLS_GROUP_CONTRACT_KEY: *ep-grp-key
      TLS_ROOT_CERT: &ep-introot /pki/internal/example-provider/ca/root.pem
      TLS_CERT: &ep-int /pki/internal/example-provider/manager/cert.pem
      TLS_KEY: &ep-int-key /pki/internal/example-provider/manager/key.pem
      TLS_INTERNAL_UNAUTHENTICATED_ROOT_CERT: *ep-introot
      TLS_INTERNAL_UNAUTHENTICATED_CERT: *ep-int
      TLS_INTERNAL_UNAUTHENTICATED_KEY: *ep-int-key
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    networks:
      default:
        # Alias = de internal-cert-hostnaam, zodat de controller TLS naar :9443 valideert.
        aliases:
          - manager.example-provider.fsc-test.local
    depends_on:
      migrate-example-provider:
        condition: service_completed_successfully
      manager-directory:
        condition: service_started

  stub-upstream:
    # Neutrale HTTP-echo die de business-app vervangt (Spec A). Wordt de endpoint_url
    # van example-service; in #724 niet gedialed (data-pad = #728).
    image: docker.io/hashicorp/http-echo:1.0
    command: ["-listen=:8080", "-text=hello from example-provider stub-upstream (#724)"]

  inway-example-provider:
    image: docker.io/federatedserviceconnectivity/inway:${IMAGE_TAG:-v1.43.7}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"   # host-UID -> leest 0600-keys
    restart: on-failure                            # boot-race met controller/manager
    command:
      - /usr/local/bin/inway
      - serve
    environment:
      LOG_TYPE: local
      LOG_LEVEL: debug
      GROUP_ID: moza-fbs-test
      # geregistreerde inway-naam; SELF_ADDRESS wordt als inway_address doorgegeven bij CreateService
      NAME: example-provider-inway
      SELF_ADDRESS: https://inway.example-provider.fsc-test.local:443
      LISTEN_ADDRESS: 0.0.0.0:8443
      MONITORING_ADDRESS: 0.0.0.0:8081
      DISABLE_CRL_CHECKS: "true"
      # Registreert zich bij de controller via TLS op de controller-internal-cert
      # (CN controller.example-provider.fsc-test.local):
      CONTROLLER_REGISTRATION_API_ADDRESS: https://controller.example-provider.fsc-test.local:9443
      # Eigen manager, internal-unauthenticated poort:
      MANAGER_INTERNAL_UNAUTHENTICATED_ADDRESS: https://manager.example-provider.fsc-test.local:9444
      # Presence-check (chart eist niet-leeg); placeholder -- inway mag crashen als
      # de waarde gedialed wordt (dan txlog-api toevoegen, zie #728):
      TX_LOG_API_ADDRESS: https://txlog.placeholder.invalid:7611
      TLS_ROOT_CERT: /pki/internal/example-provider/ca/root.pem
      TLS_CERT: /pki/internal/example-provider/inway/cert.pem
      TLS_KEY: /pki/internal/example-provider/inway/key.pem
      TLS_GROUP_ROOT_CERT: /pki/ca/root.pem
      TLS_GROUP_CERT: /pki/out/example-provider/inway/cert.pem
      TLS_GROUP_KEY: /pki/out/example-provider/inway/key.pem
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    networks:
      default:
        aliases:
          - inway.example-provider.fsc-test.local
    depends_on:
      controller-example-provider:
        condition: service_started
      manager-example-provider:
        condition: service_started
      stub-upstream:
        condition: service_started

  toolbox:
    # Curl-client BINNEN het netwerk voor de mTLS-onboarding-calls (publish-service.sh).
    # Draait als host-UID zodat het de 0600-internal-key leest.
    image: docker.io/curlimages/curl:8.11.1
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    entrypoint: ["sleep", "infinity"]
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    depends_on:
      manager-example-provider:
        condition: service_started
      controller-example-provider:
        condition: service_started

  directory-ui:
    image: docker.io/federatedserviceconnectivity/directory-ui:${IMAGE_TAG:-v1.43.7}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"   # host-UID -> leest 0600-group-key
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      LOG_TYPE: local
      LOG_LEVEL: info
      LISTEN_ADDRESS: 0.0.0.0:8080
      MONITORING_ADDRESS: 0.0.0.0:8081
      # Externe directory-manager via de SNI-router op :443.
      DIRECTORY_MANAGER_ADDRESS: https://directory.fsc-test.local:443
      BASE_URL_PATH: /
      TLS_GROUP_ROOT_CERT: /pki/ca/root.pem
      TLS_GROUP_CERT: /pki/out/example-provider/manager/cert.pem   # lezer-peer-identiteit
      TLS_GROUP_KEY: /pki/out/example-provider/manager/key.pem
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    depends_on:
      manager-directory:
        condition: service_started
      router:
        condition: service_started

  keycloak:
    # Alleen voor de optionele OIDC-variant; standaard uit. Starten met:
    #   docker compose --profile oidc up -d   (+ AUTHN_TYPE=oidc op de controller)
    profiles: ["oidc"]
    image: registry.gitlab.com/rinis-oss/fsc/images/keycloak:bfca938d
    command: start --optimized
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: keycloak-admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: keycloak
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_ADMIN: http://localhost:8081
    restart: on-failure

  migrate-controller-example-provider:
    image: docker.io/federatedserviceconnectivity/controller:${IMAGE_TAG:-v1.43.7}
    command:
      - /usr/local/bin/controller
      - migrate
      - up
      - --postgres-dsn
      - postgres://postgres:postgres@postgres:5432/fsc_controller_example_provider?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  controller-example-provider:
    image: docker.io/federatedserviceconnectivity/controller:${IMAGE_TAG:-v1.43.7}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"   # host-UID -> leest 0600-internal-key
    restart: on-failure                           # herstart bij transiënte boot-fout (DB/manager nog niet klaar)
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      LOG_TYPE: local
      LOG_LEVEL: info
      LISTEN_ADDRESS_UI: 0.0.0.0:8080
      LISTEN_ADDRESS_REGISTRATION_API: 0.0.0.0:9443
      LISTEN_ADDRESS_ADMINISTRATION_API: 0.0.0.0:9444
      MONITORING_ADDRESS: 0.0.0.0:8081
      MANAGER_ADDRESS_INTERNAL: https://manager.example-provider.fsc-test.local:9443   # = internal-cert-SAN
      GROUP_ID: moza-fbs-test
      DIRECTORY_PEER_ID: "00000000000000000010"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: fsc_controller_example_provider
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGSSLMODE: disable
      STORAGE_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/fsc_controller_example_provider?sslmode=disable
      # Lokaal ZONDER login (AUTHN_TYPE=none — een door OpenFSC ondersteunde modus). De
      # controller-management (dienst publiceren, grant->sign->accept) werkt zonder
      # loginscherm; OIDC is enkel de auth-laag ervoor en is niet nodig om dienst-
      # koppeling te testen. Volledige OIDC conform OpenFSC = TODO (zie README), want:
      #  - de keycloak-image bakt realm `organization-a` (niet `open-fsc`);
      #  - issuer-split KC_HOSTNAME (localhost) vs intern (keycloak:8080) -> 1 gedeelde
      #    hostnaam + /etc/hosts (zoals open-fsc/.hosts);
      #  - de baked client kent alleen OpenFSC's eigen redirect-URI's.
      # De AUTHN_OIDC_*-waarden hieronder zijn de ECHTE OpenFSC-waarden (modd.conf), klaar
      # voor wie AUTHN_TYPE op `oidc` zet en de plumbing regelt.
      AUTHN_TYPE: none
      AUTHN_OIDC_CLIENT_ID: open-fsc-controller-a
      AUTHN_OIDC_CLIENT_SECRET: ZXhhbXBsZS1hcHAtc2VjcmV0   # OpenFSC dev-voorbeeld (base64 "example-app-secret")
      AUTHN_OIDC_SECRET_KEY: V4KMJC8MPL4fe9jtdCAX           # sessie-encryptiesleutel (OpenFSC dev-voorbeeld)
      AUTHN_OIDC_DISCOVERY_URL: http://keycloak:8080/realms/organization-a
      AUTHN_OIDC_REDIRECT_URL: http://localhost:8090/oidc/callback
      AUTHN_OIDC_SESSION_COOKIE_SECURE: "false"
      AUTHN_OIDC_PKCE_ENABLED: "false"
      AUTHN_OIDC_INSECURE_SKIP_VERIFY_TLS: "true"
      AUTHN_OIDC_ROLES_SCOPE: groups
      AUTHN_OIDC_ROLES_CLAIM: groups
      AUTHZ_TYPE: rbac
      CSRF_PROTECTION_ENABLED: "false"
      AUDITLOG_TYPE: stdout
      TLS_ROOT_CERT: /pki/internal/example-provider/ca/root.pem
      TLS_CERT: /pki/internal/example-provider/controller/cert.pem
      TLS_KEY: /pki/internal/example-provider/controller/key.pem
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    networks:
      default:
        aliases:
          - controller.example-provider.fsc-test.local
    depends_on:
      migrate-controller-example-provider:
        condition: service_completed_successfully
      manager-example-provider:
        condition: service_started

  migrate-example-consumer:
    image: *manager-image
    command:
      - /usr/local/bin/manager
      - migrate
      - up
      - --postgres-dsn
      - postgres://postgres:postgres@postgres:5432/fsc_example_consumer?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  manager-example-consumer:
    image: *manager-image
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"   # host-UID -> leest 0600-keys (zie manager-directory)
    command:
      - /usr/local/bin/manager
      - serve
    environment:
      <<: *manager-common-env
      SELF_ADDRESS: https://example-consumer.fsc-test.local:443
      # presence-check (serve.go); niet gedialed bij announce
      TX_LOG_API_ADDRESS: https://txlog.placeholder.invalid:7611
      LISTEN_ADDRESS_EXTERNAL: 0.0.0.0:8443
      LISTEN_ADDRESS_INTERNAL: 0.0.0.0:9443
      LISTEN_ADDRESS_INTERNAL_UNAUTHENTICATED: 0.0.0.0:9444
      MONITORING_ADDRESS: 0.0.0.0:8080
      STORAGE_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/fsc_example_consumer?sslmode=disable
      TLS_GROUP_CERT: &ec-grp /pki/out/example-consumer/manager/cert.pem
      TLS_GROUP_KEY: &ec-grp-key /pki/out/example-consumer/manager/key.pem
      TLS_GROUP_TOKEN_CERT: *ec-grp
      TLS_GROUP_TOKEN_KEY: *ec-grp-key
      TLS_GROUP_CONTRACT_CERT: *ec-grp
      TLS_GROUP_CONTRACT_KEY: *ec-grp-key
      TLS_ROOT_CERT: &ec-introot /pki/internal/example-consumer/ca/root.pem
      TLS_CERT: &ec-int /pki/internal/example-consumer/manager/cert.pem
      TLS_KEY: &ec-int-key /pki/internal/example-consumer/manager/key.pem
      TLS_INTERNAL_UNAUTHENTICATED_ROOT_CERT: *ec-introot
      TLS_INTERNAL_UNAUTHENTICATED_CERT: *ec-int
      TLS_INTERNAL_UNAUTHENTICATED_KEY: *ec-int-key
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    networks:
      default:
        # Alias = de internal-cert-hostnaam, zodat controller/outway TLS naar :9443/:9444 valideren.
        aliases:
          - manager.example-consumer.fsc-test.local
    depends_on:
      migrate-example-consumer:
        condition: service_completed_successfully
      manager-directory:
        condition: service_started

  migrate-controller-example-consumer:
    image: docker.io/federatedserviceconnectivity/controller:${IMAGE_TAG:-v1.43.7}
    command:
      - /usr/local/bin/controller
      - migrate
      - up
      - --postgres-dsn
      - postgres://postgres:postgres@postgres:5432/fsc_controller_example_consumer?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  controller-example-consumer:
    image: docker.io/federatedserviceconnectivity/controller:${IMAGE_TAG:-v1.43.7}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"   # host-UID -> leest 0600-internal-key
    restart: on-failure                           # herstart bij transiënte boot-fout (DB/manager nog niet klaar)
    ports:
      - "127.0.0.1:8091:8080"                     # consumer-controller-UI (naast provider 8090)
    environment:
      LOG_TYPE: local
      LOG_LEVEL: info
      LISTEN_ADDRESS_UI: 0.0.0.0:8080
      LISTEN_ADDRESS_REGISTRATION_API: 0.0.0.0:9443
      LISTEN_ADDRESS_ADMINISTRATION_API: 0.0.0.0:9444
      MONITORING_ADDRESS: 0.0.0.0:8081
      MANAGER_ADDRESS_INTERNAL: https://manager.example-consumer.fsc-test.local:9443   # = internal-cert-SAN
      GROUP_ID: moza-fbs-test
      DIRECTORY_PEER_ID: "00000000000000000010"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: fsc_controller_example_consumer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGSSLMODE: disable
      STORAGE_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/fsc_controller_example_consumer?sslmode=disable
      # Lokaal ZONDER login (AUTHN_TYPE=none); grant-admin (afnemer-toegang) begint pas in #727.
      AUTHN_TYPE: none
      AUTHZ_TYPE: rbac
      CSRF_PROTECTION_ENABLED: "false"
      AUDITLOG_TYPE: stdout
      TLS_ROOT_CERT: /pki/internal/example-consumer/ca/root.pem
      TLS_CERT: /pki/internal/example-consumer/controller/cert.pem
      TLS_KEY: /pki/internal/example-consumer/controller/key.pem
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    networks:
      default:
        aliases:
          - controller.example-consumer.fsc-test.local
    depends_on:
      migrate-controller-example-consumer:
        condition: service_completed_successfully
      manager-example-consumer:
        condition: service_started

  outway-example-consumer:
    image: docker.io/federatedserviceconnectivity/outway:${IMAGE_TAG:-v1.43.7}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"   # host-UID -> leest 0600-keys
    restart: on-failure                            # boot-race met de eigen manager
    command:
      - /usr/local/bin/outway
      - serve
    environment:
      LOG_TYPE: local
      LOG_LEVEL: debug
      GROUP_ID: moza-fbs-test
      NAME: example-consumer-outway
      # Outway = niet-adresseerbare egress-client: identificeert zich naar de provider via
      # de cert-thumbprint (FSC grant outway.identification.public_key_thumbprint), niet via
      # een SELF_ADDRESS zoals de inway. LISTEN_ADDRESS = lokale proxy-poort voor de app.
      LISTEN_ADDRESS: 0.0.0.0:8443
      MONITORING_ADDRESS: 0.0.0.0:8081
      DISABLE_CRL_CHECKS: "true"
      # Leest zijn contract-/service-config van de eigen manager (internal-unauthenticated):
      MANAGER_INTERNAL_UNAUTHENTICATED_ADDRESS: https://manager.example-consumer.fsc-test.local:9444
      # Presence-check (placeholder); outway mag crashen als de waarde bij egress gedialed
      # wordt (dan txlog-api toevoegen, #728). In #725 boot-t de outway enkel:
      TX_LOG_API_ADDRESS: https://txlog.placeholder.invalid:7611
      TLS_ROOT_CERT: /pki/internal/example-consumer/ca/root.pem
      TLS_CERT: /pki/internal/example-consumer/outway/cert.pem
      TLS_KEY: /pki/internal/example-consumer/outway/key.pem
      TLS_GROUP_ROOT_CERT: /pki/ca/root.pem
      TLS_GROUP_CERT: /pki/out/example-consumer/outway/cert.pem
      TLS_GROUP_KEY: /pki/out/example-consumer/outway/key.pem
    volumes:
      - "${PKI_DIR:?zet PKI_DIR in .env}:/pki:ro"
    networks:
      default:
        aliases:
          - outway.example-consumer.fsc-test.local
    depends_on:
      manager-example-consumer:
        condition: service_started

networks:
  default:
    driver: bridge
