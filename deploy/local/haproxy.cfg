# SNI-passthrough router op :443 (mode tcp = geen TLS-terminatie), ≙ OpenShift-
# passthrough-Route. Routeert op SNI-hostnaam naar de juiste manager-external-poort.
global
    log stdout format raw local0 info

# Docker's embedded DNS — laat haproxy backends runtime resolven, zodat het start
# ook als een manager (nog) niet draait en later weer bijkomt. Zonder dit cachet
# haproxy de backend-IP eenmalig bij boot → na een `up --force-recreate` (zie
# README) routeert het naar dode IP's tot de router zélf herstart.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  1h
    timeout server  1h
    default-server  init-addr none resolvers docker check

frontend https_sni
    bind *:443
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }
    use_backend dir  if { req_ssl_sni -i directory.fsc-test.local }
    use_backend ep   if { req_ssl_sni -i example-provider.fsc-test.local }
    use_backend ec   if { req_ssl_sni -i example-consumer.fsc-test.local }
    # #728 data-plane: outway -> inway op :443-SNI-passthrough (inway luistert intern op :8443;
    # kan als non-root geen :443 binden -> router forward, ≙ OpenShift passthrough-Route).
    use_backend inway_ep if { req_ssl_sni -i inway.example-provider.fsc-test.local }

backend dir
    server s1 manager-directory:8443
backend ep
    server s1 manager-example-provider:8443
backend ec
    server s1 manager-example-consumer:8443
backend inway_ep
    server s1 inway-example-provider:8443
