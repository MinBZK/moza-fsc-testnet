# yamllint config. https://yamllint.readthedocs.io
extends: default
rules:
  line-length:
    max: 120
    allow-non-breakable-words: true
  document-start: disable
  comments:
    min-spaces-from-content: 1
  truthy:
    # GitHub Actions gebruikt `on:` als sleutel — niet als boolean behandelen.
    check-keys: false
ignore: |
  .github/workflows/
