# SNI-passthrough router op 443 — ≙ de OpenShift-router op ODCN.
# mode tcp = HAProxy termineert TLS NIET; leest alleen de SNI uit de ClientHello
# en routeert het TCP door. mTLS + cert-binding blijven end-to-end intact.

global
    log stdout format raw local0 info

# Docker's embedded DNS — laat haproxy backends runtime resolven, zodat het
# start ook als een manager (nog) niet draait en later weer bijkomt.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s

defaults
    mode    tcp
    log     global
    option  tcplog
    timeout connect 5s
    # Mesh-verbindingen zijn langlevend (sync-stream); ruime timeouts zoals een
    # OpenShift-passthrough-Route. Te kort → de stream wordt afgekapt (cD).
    timeout client  1h
    timeout server  1h
    default-server  init-addr none resolvers docker check

frontend mesh
    bind *:443
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }   # wacht op ClientHello (SNI)

    use_backend dir  if { req_ssl_sni -i directory.shared.open-fsc.localhost }
    use_backend orga if { req_ssl_sni -i manager.organization-a.open-fsc.localhost }
    use_backend orgb if { req_ssl_sni -i manager.organization-b.open-fsc.localhost }

# Backends = de EXTERNE (mesh) listener van elke manager.
backend dir
    server s manager-directory:7501
backend orga
    server s manager-org-a:7614
backend orgb
    server s manager-org-b:7708
